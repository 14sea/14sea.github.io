ate</span></span><br><span class="line"><span class="meta">$</span><span class="bash"> deactivate</span></span><br><span class="line"><span class="meta">$</span><span class="bash"> <span class="built_in">source</span> /Volumes/DISK00/CODE/python/env3/bin/activate</span></span><br><span class="line"><span class="meta">$</span><span class="bash"> deactivate</span></span><br></pre></td></tr></table></figure>


<figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">#</span><span class="bash"> Python 工作环境管理</span></span><br><span class="line"><span class="meta">#</span><span class="bash"> 1. 使用 pyenv 管理不同的 Python 版本</span></span><br><span class="line"><span class="meta">#</span><span class="bash"> https://github.com/pyenv/pyenv</span></span><br><span class="line"><span class="meta">$</span><span class="bash"> git <span class="built_in">clone</span> https://github.com/pyenv/pyenv.git ~/.pyenv</span></span><br><span class="line"><span class="meta">$</span><span class="bash"> <span class="built_in">echo</span> <span class="string">&#x27;export PYENV_ROOT=&quot;$HOME/.pyenv&quot;&#x27;</span> &gt;&gt; ~/.zshrc</span></span><br><span class="line"><span class="meta">$</span><span class="bash"> <span class="built_in">echo</span> <span class="string">&#x27;export PATH=&quot;$PYENV_ROOT/bin:$PATH&quot;&#x27;</span> &gt;&gt; ~/.zshrc</span></span><br><span class="line"><span class="meta">$</span><span class="bash"> <span class="built_in">echo</span> -e <span class="string">&#x27;if command -v pyenv 1&gt;/dev/null 2&gt;&amp;1; then\n  eval &quot;$(pyenv init -)&quot;\nfi&#x27;</span> &gt;&gt; ~/.zshrc</span></span><br><span class="line"><span class="meta">#</span><span class="bash"> 官方建议重启 shell</span></span><br><span class="line">exec &quot;$SHELL&quot;</span><br><span class="line"><span class="meta">#</span><span class="bash"> 也可以使用 <span class="built_in">source</span> 重新载入 bash 配置文件</span></span><br><span class="line"><span class="meta">#</span><span class="bash"> $ <span class="built_in">source</span> ~/.zshrc</span></span><br><span class="line"><span class="meta">#</span><span class="bash"> 查看帮助</span></span><br><span class="line"><span class="meta">$</span><span class="bash"> pyenv --<span class="built_in">help</span></span></span><br><span class="line"><span class="meta">#</span><span class="bash"> pyenv 查看当前支持的 Python 版本</span></span><br><span class="line"><span class="meta">$</span><span class="bash"> pyenv install --list</span> </span><br><span class="line"><span class="meta">#</span><span class="bash"> 安装指定版本的 Python</span></span><br><span class="line"><span class="meta">$</span><span class="bash"> pyenv install -v 3.9.1</span></span><br><span class="line"><span class="meta">$</span><span class="bash"> pyenv install -v 2.7.18</span></span><br><span class="line"><span class="meta">#</span><span class="bash"> 选择不同的 Python 版本</span></span><br><span class="line"><span class="meta">$</span><span class="bash"> pyenv global 3.6.0</span></span><br><span class="line"><span class="meta">$</span><span class="bash"> pyenv versions</span></span><br><span class="line"><span class="meta">#</span><span class="bash"> 删除特定版本的 Python</span></span><br><span class="line"><span class="meta">$</span><span class="bash"> pyenv uninstall 2.7.10</span></span><br><span class="line"></span><br><span class="line"><span class="meta">#</span><span class="bash"> 2. 使用 virtualenv 管理不同的项目</span></span><br><span class="line"><span class="meta">#</span><span class="bash"> https://github.com/pyenv/pyenv-virtualenv</span></span><br><span class="line"><span class="meta">#</span><span class="bash"> pyenv-virtualenv 的安装</span></span><br><span class="line"><span class="meta">$</span><span class="bash"> git <span class="built_in">clone</span> https://github.com/pyenv/pyenv-virtualenv.git $(pyenv root)/plugins/pyenv-virtualenv</span></span><br><span class="line"><span class="meta">$</span><span class="bash"> <span class="built_in">echo</span> <span class="string">&#x27;eval &quot;$(pyenv virtualenv-init -)&quot;&#x27;</span> &gt;&gt; ~/.zshenv</span></span><br><span class="line"><span class="meta">$</span><span class="bash"> <span class="built_in">exec</span> <span class="string">&quot;<span class="variable">$SHELL</span>&quot;</span></span></span><br><span class="line"><span class="meta">#</span><span class="bash"> 查看帮助</span></span><br><span class="line"><span class="meta">$</span><span class="bash"> pyenv <span class="built_in">help</span> virtualenv</span></span><br><span class="line"><span class="meta">#</span><span class="bash"> pyenv-virtualenv 的使用</span></span><br><span class="line"><span class="meta">$</span><span class="bash"> pyenv virtualenv 2.7.13 first_project</span></span><br><span class="line"><span class="meta">$</span><span class="bash"> pyenv virtualenv 2.7.13 second_project</span></span><br><span class="line"><span class="meta">$</span><span class="bash"> pyenv virtualenvs</span></span><br><span class="line"><span class="meta">#</span><span class="bash"> 进入虚拟环境</span></span><br><span class="line"><span class="meta">$</span><span class="bash"> pyenv activate first_project</span></span><br><span class="line"><span class="meta">#</span><span class="bash"> 退出虚拟环境</span></span><br><span class="line"><span class="meta">$</span><span class="bash"> pyenv deactivate</span></span><br><span class="line"></span><br><span class="line"><span class="meta">#</span><span class="bash"> 在不同的工作环境安装不同的 Flask 版本</span></span><br><span class="line"><span class="meta">$</span><span class="bash"> pyenv activate first_project</span></span><br><span class="line"><span class="meta">$</span><span class="bash"> pip install flask==0.8</span></span><br><span class="line"><span class="meta">$</span><span class="bash"> pyenv deactivate</span></span><br><span class="line"><span class="meta">$</span><span class="bash"> pyenv activate second_project</span></span><br><span class="line"><span class="meta">$</span><span class="bash"> pip install flask==0.9</span></span><br><span class="line"><span class="meta">$</span><span class="bash"> pyenv deactivate</span></span><br><span class="line"></span><br><span class="line"><span class="meta">#</span><span class="bash"> 删除虚拟环境</span></span><br><span class="line"><span class="meta">$</span><span class="bash"> pyenv virtualenv-delete first_project</span></span><br></pre></td></tr></table></figure>

<script>
  window.addEventListener('tabs:register', () => {
    let { activeClass } = CONFIG.comments;
    if (CONFIG.comments.storage) {
      activeClass = localStorage.getItem('comments_active') || activeClass;
    }
    if (activeClass) {
      let activeTab = document.querySelector(`a[href="#comment-${activeClass}"]`);
      if (activeTab) {
        activeTab.click();
      }
    }
  });
  if (CONFIG.comments.storage) {
    window.addEventListener('tabs:click', event => {
      if (!event.target.matches('.tabs-comment .tab-content .tab-pane')) return;
      let commentClass = event.target.classList[1];
      localStorage.setItem('comments_active', commentClass);
    });
  }
